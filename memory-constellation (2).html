<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Memory Constellation • A-Frame</title>
    <meta name="description" content="A 3D constellation of floating memory images" />
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
    <style>
      body { margin: 0; }
      #hint {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        color: #f2f1f9;
        font-family: -apple-system, sans-serif;
        font-size: 13px;
        opacity: 0.7;
        pointer-events: none;
        text-align: center;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="hint">drag to orbit &middot; scroll to zoom &middot; click a memory to bring it forward</div>

    <script>
      /**
       * memory-constellation
       *
       * Replaces the particle-galaxy shader with a set of floating image
       * "memory" cards scattered through a spherical volume, gently
       * bobbing/rotating, connected by faint constellation lines to their
       * nearest neighbors. Swap PLACEHOLDER_IMAGES for real memory photos
       * (any URL works) to make this the real thing.
       */
      AFRAME.registerComponent('memory-constellation', {
        schema: {
          count: { type: 'number', default: 24 },
          radius: { type: 'number', default: 4.5 },
          cardSize: { type: 'number', default: 0.9 },
          lineOpacity: { type: 'number', default: 0.18 },
          maxConnections: { type: 'number', default: 3 }
        },

        init() {
          this.memories = [];
          this.clock = new THREE.Clock();

          // ---- placeholder memory images -------------------------------
          // Swap these URLs for real photos whenever you're ready.
          // placehold.co generates a labeled placeholder image per id.
          const palette = ['f8901b', 'fa89b3', '51c695', '57b1f1', 'e9734b', '7d6deb'];
          const PLACEHOLDER_IMAGES = Array.from({ length: this.data.count }, (_, i) => {
            const bg = palette[i % palette.length];
            return `https://placehold.co/256x256/${bg}/f2f1f9?text=Memory+${i + 1}`;
          });

          const group = new THREE.Group();
          this.group = group;

          const loader = new THREE.TextureLoader();
          loader.crossOrigin = 'anonymous';

          const positions = this.generatePositions(this.data.count, this.data.radius);

          PLACEHOLDER_IMAGES.forEach((url, i) => {
            const texture = loader.load(url);
            texture.colorSpace = THREE.SRGBColorSpace;

            const material = new THREE.SpriteMaterial({
              map: texture,
              transparent: true,
              depthWrite: false
            });

            const sprite = new THREE.Sprite(material);
            sprite.scale.setScalar(this.data.cardSize);
            sprite.position.copy(positions[i]);
            sprite.userData.basePosition = positions[i].clone();
            sprite.userData.phase = Math.random() * Math.PI * 2;
            sprite.userData.speed = 0.3 + Math.random() * 0.4;
            sprite.userData.bobAmount = 0.12 + Math.random() * 0.18;
            sprite.userData.baseScale = this.data.cardSize;
            sprite.userData.index = i;

            group.add(sprite);
            this.memories.push(sprite);
          });

          // ---- constellation lines between nearby memories --------------
          this.linesGroup = new THREE.Group();
          const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x7d6deb,
            transparent: true,
            opacity: this.data.lineOpacity
          });

          for (let i = 0; i < this.memories.length; i++) {
            const distances = this.memories
              .map((m, j) => ({ j, d: this.memories[i].position.distanceTo(m.position) }))
              .filter((e) => e.j !== i)
              .sort((a, b) => a.d - b.d)
              .slice(0, this.data.maxConnections);

            distances.forEach(({ j }) => {
              if (j > i) {
                const geom = new THREE.BufferGeometry().setFromPoints([
                  this.memories[i].position,
                  this.memories[j].position
                ]);
                this.linesGroup.add(new THREE.Line(geom, lineMaterial));
              }
            });
          }
          group.add(this.linesGroup);

          // ---- soft ambient glow at center --------------------------------
          const glowGeo = new THREE.SphereGeometry(0.3, 16, 16);
          const glowMat = new THREE.MeshBasicMaterial({
            color: 0xe1dff6,
            transparent: true,
            opacity: 0.3
          });
          this.glow = new THREE.Mesh(glowGeo, glowMat);
          group.add(this.glow);

          this.el.setObject3D('mesh', group);

          // click-to-focus interaction
          this.raycaster = new THREE.Raycaster();
          this.onClick = this.onClick.bind(this);
          this.el.sceneEl.canvas.addEventListener('click', this.onClick);
        },

        generatePositions(count, radius) {
          // Fibonacci sphere distribution, then jittered for an organic feel
          const points = [];
          const golden = Math.PI * (3 - Math.sqrt(5));
          for (let i = 0; i < count; i++) {
            const y = 1 - (i / (count - 1)) * 2;
            const r = Math.sqrt(1 - y * y);
            const theta = golden * i;
            const jitter = 0.65 + Math.random() * 0.45;
            const x = Math.cos(theta) * r;
            const z = Math.sin(theta) * r;
            points.push(new THREE.Vector3(x, y, z).multiplyScalar(radius * jitter));
          }
          return points;
        },

        onClick(evt) {
          const camera = this.el.sceneEl.camera;
          const rect = this.el.sceneEl.canvas.getBoundingClientRect();
          const mouse = new THREE.Vector2(
            ((evt.clientX - rect.left) / rect.width) * 2 - 1,
            -((evt.clientY - rect.top) / rect.height) * 2 + 1
          );
          this.raycaster.setFromCamera(mouse, camera);
          const hits = this.raycaster.intersectObjects(this.memories, false);
          if (hits.length) {
            const sprite = hits[0].object;
            sprite.userData.focused = !sprite.userData.focused;
          }
        },

        tick() {
          const t = this.clock.getElapsedTime();

          this.group.rotation.y = t * 0.03;
          this.glow.scale.setScalar(1 + Math.sin(t * 1.5) * 0.08);

          this.memories.forEach((sprite) => {
            const { basePosition, phase, speed, bobAmount, baseScale, focused } = sprite.userData;
            sprite.position.y = basePosition.y + Math.sin(t * speed + phase) * bobAmount;
            sprite.position.x = basePosition.x + Math.cos(t * speed * 0.7 + phase) * (bobAmount * 0.4);
            const targetScale = focused ? baseScale * 1.6 : baseScale;
            sprite.scale.setScalar(THREE.MathUtils.lerp(sprite.scale.x, targetScale, 0.08));
          });

          // keep line endpoints synced to the bobbing sprites
          let li = 0;
          for (let i = 0; i < this.memories.length; i++) {
            const near = this.memories
              .map((m, j) => ({ j, d: this.memories[i].userData.basePosition.distanceTo(m.userData.basePosition) }))
              .filter((e) => e.j !== i)
              .sort((a, b) => a.d - b.d)
              .slice(0, this.data.maxConnections);
            near.forEach(({ j }) => {
              if (j > i && this.linesGroup.children[li]) {
                const posAttr = this.linesGroup.children[li].geometry.attributes.position;
                posAttr.setXYZ(0, this.memories[i].position.x, this.memories[i].position.y, this.memories[i].position.z);
                posAttr.setXYZ(1, this.memories[j].position.x, this.memories[j].position.y, this.memories[j].position.z);
                posAttr.needsUpdate = true;
                li++;
              }
            });
          }
        },

        remove() {
          const mesh = this.el.getObject3D('mesh');
          if (mesh) {
            this.memories.forEach((s) => {
              s.material.map && s.material.map.dispose();
              s.material.dispose();
            });
            this.linesGroup.children.forEach((l) => {
              l.geometry.dispose();
              l.material.dispose();
            });
            this.el.removeObject3D('mesh');
          }
          if (this.el.sceneEl && this.el.sceneEl.canvas) {
            this.el.sceneEl.canvas.removeEventListener('click', this.onClick);
          }
        }
      });
    </script>

    <a-scene background="color: #7d6deb">
      <a-entity memory-constellation></a-entity>
      <a-entity
        camera="fov: 50; near: 0.1; far: 100"
        look-controls="enabled: false"
        orbit-controls="target: 0 0 0; minDistance: 0.1; maxDistance: 50; initialPosition: 4 2 7; enableDamping: true; rotateSpeed: 0.6"
      ></a-entity>
    </a-scene>
  </body>
</html>
